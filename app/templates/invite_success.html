<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uno Installed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a0a0a;
            color: #fafafa;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: #141414;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 3rem 2.5rem;
            text-align: center;
        }
        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #a3a3a3;
            margin-bottom: 1.5rem;
        }
        .check {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #14532d;
            border: 2px solid #22c55e;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.5rem;
        }
        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 1.75rem;
            line-height: 1.2;
            margin-bottom: 1rem;
        }
        .accent { color: #f97316; }
        .desc {
            color: #a3a3a3;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            line-height: 1.7;
        }
        .instructions {
            background: #0f0f0f;
            border: 1px solid #262626;
            border-radius: 8px;
            padding: 1.25rem;
            margin-top: 1.5rem;
            text-align: left;
        }
        .instructions h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            color: #f97316;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
        }
        .instructions li {
            color: #a3a3a3;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            margin-left: 1.25rem;
        }
        .instructions code {
            font-family: 'JetBrains Mono', monospace;
            background: #1a1a1a;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #fafafa;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Gigabox</div>
        <div class="check">&#10003;</div>
        <h1><span class="accent">Uno</span> is ready</h1>
        <p class="desc">Uno has been added to your Slack workspace.</p>
        <div class="instructions">
            <h3>Get started</h3>
            <ol>
                <li>Mention <code>@Uno</code> in any channel to ask a question</li>
                <li>Send a direct message to Uno for a private conversation</li>
                <li>Try: <code>@Uno what can you do?</code></li>
            </ol>
        </div>
    </div>
</body>
</html>
